name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
    # Cloudflare Pages 직접 연동으로 전환 — 자동 배포 비활성화

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx @cloudflare/next-on-pages
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy .vercel/output/static --project-name=naverv --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
